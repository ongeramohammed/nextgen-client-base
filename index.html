<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f5132" />
  <title>NextGen Client Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">NG</div>
      <div><strong>NextGen Client Base</strong><span>Manage · Track · Grow</span></div>
      <button class="collapse-btn" id="collapseBtn" title="Collapse menu">☰</button>
    </div>
    <nav id="nav">
      <p>Overview</p>
      <button class="active" data-page="dashboard">▣ <span>Dashboard</span></button>
      <p>Business</p>
      <button data-page="clients">👥 <span>Clients</span></button>
      <button data-page="payments">💳 <span>Payments</span></button>
      <button data-page="invoices">🧾 <span>Invoices</span><b id="invoiceBadge"></b></button>
      <p>Services</p>
      <button data-page="services">📦 <span>Current Services</span></button>
      <button data-page="tasks">🔁 <span>Recurrent Services</span></button>
      <button data-page="reminders">🔔 <span>Reminders</span><b id="reminderBadge"></b></button>
      <p>Stewardship</p>
      <button data-page="tithe">💚 <span>Growth Fund</span></button>
      <button data-page="vat">🏛️ <span>VAT Tracker</span></button>
      <p>Tools</p>
      <button data-page="integrations">🔌 <span>M-Pesa & Bank</span></button>
      <button data-page="reports">📊 <span>Reports</span></button>
      <button data-page="settings">⚙️ <span>Settings</span></button>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="top-title"><strong>NextGen Client Base</strong><span id="pageCrumb">Dashboard</span></div>
      <div class="search-wrap">
        <input id="globalSearch" placeholder="Search clients, invoices, payments, services..." autocomplete="off" />
        <div class="search-results" id="searchResults"></div>
      </div>
      <button class="notif" id="notifBtn">🔔<b id="notifCount"></b></button>
      <div class="profile"><span id="timeNow"></span><div class="avatar">R</div></div>
    </header>
    <section id="content" class="content"></section>
  </main>
</div>
<div class="mobile-tab" id="mobileTab"></div>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"></div>
<script src="app.js"></script>
</body>
</html>
